services:
  longbox-db:
    container_name: longbox-db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: longbox
      POSTGRES_PASSWORD: longbox_secret
      POSTGRES_DB: longbox
    volumes:
      - longbox_postgres_data:/var/lib/postgresql/data
    networks:
      - longbox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U longbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  longbox-web:
    build: .
    container_name: longbox-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount your comics library (read-only)
      - ${MEDIA_ROOT:-/comics}:/comics:ro
      # Persist cover cache across restarts
      - longbox_cover_cache:/app/public/cache/covers
    environment:
      # Database
      DATABASE_URL: postgresql://longbox:longbox_secret@longbox-db:5432/longbox
      # Library
      LIBRARY_ROOT: /comics
      LIBRARY_PATH: /comics
      # Auth (generate your own: openssl rand -base64 32)
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env or environment}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    depends_on:
      longbox-db:
        condition: service_healthy
    networks:
      - longbox-net

networks:
  longbox-net:
    driver: bridge

volumes:
  longbox_postgres_data:
  longbox_cover_cache:
